server {
    location /_next/static/ {
        alias /path/to/your/nextjs/app/.next/static/;  # Replace with actual path

        # Enable gzip compression for static assets
        gzip on;
        gzip_types text/plain application/javascript application/json application/x-javascript text/css image/svg+xml;
        gzip_min_length 256;

        # Cache static assets for 1 year (immutable)
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";

        # Optional: Enable HTTP/2 push (if supported by your server setup)
        # http2_push /_next/static/...;
    }
}
